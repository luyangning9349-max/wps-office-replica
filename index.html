<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2025年金山办公年报 - WPS PDF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div class="wps-app">
      <!-- 顶部标题栏 -->
      <header class="title-bar">
        <div class="title-bar__left">
          <div class="wps-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <rect x="1" y="3" width="22" height="18" rx="3" fill="#E7433A" />
              <text x="12" y="16" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Arial,sans-serif">W</text>
            </svg>
          </div>
          <nav class="doc-tabs">
            <button class="doc-tab doc-tab--active">
              <span class="doc-tab__icon doc-tab__icon--pdf">P</span>
              2025年金山办公年报.pdf
              <span class="doc-tab__close" aria-label="关闭">×</span>
            </button>
            <button class="doc-tab doc-tab--add" title="新建">+</button>
          </nav>
        </div>
        <div class="title-bar__right">
          <div class="search-box">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <circle cx="6.5" cy="6.5" r="5" fill="none" stroke="currentColor" stroke-width="1.5" />
              <path d="M10 10l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <span>搜索</span>
          </div>
          <button class="icon-btn" title="通知" aria-label="通知">
            <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
              <path d="M8 2a4 4 0 014 4v2.5l1 2H3l1-2V6a4 4 0 014-4z" fill="none" stroke="currentColor" stroke-width="1.2" />
              <path d="M6.5 12.5a1.5 1.5 0 003 0" fill="none" stroke="currentColor" stroke-width="1.2" />
            </svg>
          </button>
          <div class="avatar" aria-hidden="true">卢</div>
          <button class="btn-share">分享</button>
        </div>
      </header>

      <!-- PDF Ribbon 标签 -->
      <nav class="ribbon-tabs">
        <button class="ribbon-tab ribbon-tab--active" id="ribbonTabHome">开始</button>
        <button class="ribbon-tab">插入</button>
        <button class="ribbon-tab">编辑</button>
        <button class="ribbon-tab">页面</button>
        <button class="ribbon-tab">批注</button>
        <button class="ribbon-tab">工具</button>
        <button class="ribbon-tab">保护</button>
        <button class="ribbon-tab">转换</button>
        <button class="ribbon-tab ribbon-tab--ai" id="wpsAiTab" type="button" aria-expanded="false" aria-controls="lingxiSidebar">
          <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
            <path d="M8 1l1.5 4.5L14 7l-4.5 1.5L8 13l-1.5-4.5L2 7l4.5-1.5z" fill="currentColor" />
          </svg>
          WPS AI
        </button>
      </nav>

      <!-- PDF 工具栏 -->
      <div class="pdf-toolbar">
        <div class="pdf-toolbar__group">
          <button class="pdf-tool pdf-tool--active" title="手型">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M8 5.5V11l-1.5 1.5a2 2 0 002.8 2.8L13 13.5V8a1 1 0 112 0v5.5l1.5-1.5a2 2 0 012.8 2.8L16 18H9a3 3 0 01-3-3V9.5a1.5 1.5 0 113 0V11" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <button class="pdf-tool" title="选择">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M5 3l3 14 2.5-5.5L16 9z" fill="currentColor" />
            </svg>
          </button>
          <button class="pdf-tool" title="打印">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M6 9V3h12v6M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v7H6z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
            </svg>
          </button>
          <button class="pdf-tool" title="截图">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.4" />
              <path d="M8 3h8M12 15a3 3 0 100-6 3 3 0 000 6z" fill="none" stroke="currentColor" stroke-width="1.4" />
            </svg>
          </button>
          <button class="pdf-tool" title="复制图片">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <rect x="8" y="8" width="12" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.4" />
              <path d="M4 16V5a1 1 0 011-1h11" fill="none" stroke="currentColor" stroke-width="1.4" />
            </svg>
          </button>
        </div>

        <div class="pdf-toolbar__divider"></div>

        <div class="pdf-toolbar__group pdf-toolbar__group--convert">
          <button class="pdf-convert-btn">
            <span class="pdf-convert-btn__icon pdf-convert-btn__icon--word">W</span>
            <span>PDF转Word</span>
          </button>
          <button class="pdf-convert-btn">
            <span class="pdf-convert-btn__icon pdf-convert-btn__icon--excel">X</span>
            <span>PDF转Excel</span>
          </button>
          <button class="pdf-convert-btn">
            <span class="pdf-convert-btn__icon pdf-convert-btn__icon--image">
              <svg viewBox="0 0 16 16" width="11" height="11" aria-hidden="true">
                <rect x="2.5" y="3.5" width="11" height="9" rx="1.2" fill="none" stroke="#fff" stroke-width="1.3" />
                <circle cx="6" cy="7" r="1.1" fill="#fff" />
                <path d="M3.5 11.5l2.8-2.2 2.4 1.9 2.8-3.6 2.8 3.9" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span>输出为图片</span>
          </button>
        </div>

        <div class="pdf-toolbar__divider"></div>

        <div class="pdf-toolbar__group">
          <button class="pdf-tool" title="查找">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="1.4" />
              <path d="M15 15l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
          </button>
          <button class="pdf-tool" title="插入文字">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M6 4h12M12 4v16M8 20h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
          </button>
          <button class="pdf-tool" title="高亮">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M4 20h16M9 4l-3 9h6z" fill="#FFE566" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" />
            </svg>
          </button>
          <button class="pdf-tool" title="下划线">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M6 4v8a6 6 0 0012 0V4M4 20h16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
          </button>
          <button class="pdf-tool" title="删除线">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M4 12h16M8 6c0-2 2-3 4-3s4 1 4 3M8 18c0 2 2 3 4 3s4-1 4-3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
          </button>
          <button class="pdf-tool" title="文本框">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <rect x="4" y="6" width="16" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.4" stroke-dasharray="3 2" />
              <path d="M8 10h8M8 14h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
            </svg>
          </button>
          <button class="pdf-tool" title="图章">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <circle cx="12" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="1.4" />
              <path d="M8 20h8M10 16v4M14 16v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
          </button>
        </div>

        <div class="pdf-toolbar__divider"></div>

        <div class="pdf-toolbar__group pdf-toolbar__group--nav">
          <button class="pdf-tool pdf-tool--sm" data-pager="first" title="第一页">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <path d="M3 3v10M9 3l4 5-4 5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <button class="pdf-tool pdf-tool--sm" data-pager="prev" title="上一页">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <path d="M10 3L5 8l5 5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <div class="page-input">
            <input type="text" value="2" aria-label="当前页" />
            <span>/</span>
            <span class="page-total">20</span>
          </div>
          <button class="pdf-tool pdf-tool--sm" data-pager="next" title="下一页">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <path d="M6 3l5 5-5 5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <button class="pdf-tool pdf-tool--sm" data-pager="last" title="最后一页">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <path d="M13 3v10M7 3l-4 5 4 5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>

        <div class="pdf-toolbar__divider"></div>

        <div class="pdf-toolbar__group">
          <button class="zoom-dropdown" type="button" aria-haspopup="listbox" aria-label="缩放比例">
            <span>89%</span>
            <svg viewBox="0 0 12 12" width="10" height="10" aria-hidden="true">
              <path d="M2 4l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
            </svg>
          </button>
        </div>

        <div class="pdf-toolbar__divider"></div>

        <div class="pdf-toolbar__group pdf-toolbar__group--view">
          <button class="pdf-tool" data-view-mode="single" title="单页">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <rect x="7" y="3" width="10" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="1.4" />
            </svg>
          </button>
          <button class="pdf-tool pdf-tool--active" data-view-mode="continuous" title="连续阅读">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <rect x="7" y="2" width="10" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.4" />
              <rect x="7" y="14" width="10" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.4" />
            </svg>
          </button>
          <button class="pdf-tool" data-view-mode="double" title="双页">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <rect x="3" y="4" width="8" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="1.4" />
              <rect x="13" y="4" width="8" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="1.4" />
            </svg>
          </button>
        </div>
      </div>

      <!-- 工作区：PDF + 灵犀侧边栏 -->
      <div class="workspace" id="workspace">
      <!-- PDF 阅读区 -->
      <main class="pdf-viewer">
        <aside class="float-widget" id="floatWidget" data-mode="default" aria-label="文档工具悬浮入口">
          <div class="float-widget__slot">
          <div class="float-widget__compact float-widget__compact--default">
            <span class="float-widget__icon float-widget__icon--translate" aria-hidden="true">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
                <path d="M12.5 0C13.8807 0 15 1.11929 15 2.5V9H13V2.5C13 2.22386 12.7761 2 12.5 2H2.5C2.22386 2 2 2.22386 2 2.5V13.5C2 13.7761 2.22386 14 2.5 14H7V16H2.5C1.11929 16 0 14.8807 0 13.5V2.5C0 1.11929 1.11929 0 2.5 0H12.5Z" fill="#1F69E0"/>
                <path d="M11 8.5V9.71875C11 10.1776 10.6881 10.5772 10.2383 10.668C9.51869 10.8132 8.41612 11 7.5 11C6.58388 11 5.48131 10.8132 4.76172 10.668C4.31192 10.5772 4 10.1776 4 9.71875V8.5C4 8.5 5 9 7.5 9C10 9 11 8.5 11 8.5Z" fill="#1F69E0"/>
                <path d="M7.5 3C8.32843 3 9 3.67157 9 4.5C9 4.94407 8.80568 5.34156 8.49902 5.61621V5.86719C8.49902 6.5698 8.86817 7.22159 9.4707 7.58301L9.85449 7.8125C9.29918 7.91185 8.52634 8 7.5 8C6.47249 8 5.69901 7.912 5.14355 7.8125L5.52832 7.58301C6.1305 7.2216 6.49889 6.57046 6.49902 5.86816V5.61426C6.19356 5.33967 6 4.94308 6 4.5C6 3.67157 6.67157 3 7.5 3Z" fill="#1F69E0"/>
                <path fill-rule="evenodd" clip-rule="evenodd" d="M15.7071 10.4928C16.0976 10.8834 16.0976 11.5165 15.7071 11.9071L12.0607 15.5535C11.4749 16.1393 10.5251 16.1393 9.93934 15.5535L8.29289 13.9071C7.90237 13.5165 7.90237 12.8834 8.29289 12.4928C8.68342 12.1023 9.31658 12.1023 9.70711 12.4928L11 13.7857L14.2929 10.4928C14.6834 10.1023 15.3166 10.1023 15.7071 10.4928Z" fill="#458BFA"/>
              </svg>
            </span>
            <span class="float-widget__label">全文翻译</span>
          </div>

          <button class="float-widget__compact float-widget__compact--batch" type="button" hidden aria-label="批量调整图片大小，打开灵犀侧边栏">
            <span class="float-widget__ai-ring" aria-hidden="true"></span>
            <span class="float-widget__icon float-widget__icon--batch" aria-hidden="true">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
                <rect x="2" y="3" width="5" height="4" rx="0.8" stroke="#7B61FF" stroke-width="1.2"/>
                <rect x="9" y="3" width="5" height="6" rx="0.8" stroke="#7B61FF" stroke-width="1.2"/>
                <rect x="2" y="9" width="5" height="4" rx="0.8" stroke="#7B61FF" stroke-width="1.2"/>
                <path d="M9 12h5" stroke="#7B61FF" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="float-widget__label">批量调整图片大小</span>
            <span class="float-widget__ai-badge" aria-hidden="true">AI</span>
          </button>
          </div>

          <div class="float-widget__panel" role="menu" aria-label="文档工具菜单">
            <button class="float-menu-item float-menu-item--batch-resize" type="button" role="menuitem" hidden>
              <span class="float-widget__icon float-widget__icon--batch" aria-hidden="true">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
                  <rect x="2" y="3" width="5" height="4" rx="0.8" stroke="#7B61FF" stroke-width="1.2"/>
                  <rect x="9" y="3" width="5" height="6" rx="0.8" stroke="#7B61FF" stroke-width="1.2"/>
                  <rect x="2" y="9" width="5" height="4" rx="0.8" stroke="#7B61FF" stroke-width="1.2"/>
                  <path d="M9 12h5" stroke="#7B61FF" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="float-menu-item__text">批量调整图片大小</span>
            </button>
            <button class="float-menu-item float-menu-item--batch-replace" type="button" role="menuitem" hidden>
              <span class="float-widget__icon float-widget__icon--replace" aria-hidden="true">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
                  <path d="M3 4.5h6.5M3 8h4.5M3 11.5H6" stroke="#7B61FF" stroke-width="1.2" stroke-linecap="round"/>
                  <path d="M10.5 3.5l2 2-4.5 4.5H8V8l4.5-4.5z" fill="#7B61FF"/>
                  <path d="M12.5 10.5H14a1 1 0 011 1v2a1 1 0 01-1 1h-2" stroke="#7B61FF" stroke-width="1.1" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="float-menu-item__text">将2025替换为2026</span>
            </button>
            <button class="float-menu-item float-menu-item--active" type="button" role="menuitem">
              <span class="float-widget__icon float-widget__icon--translate" aria-hidden="true">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
                  <path d="M12.5 0C13.8807 0 15 1.11929 15 2.5V9H13V2.5C13 2.22386 12.7761 2 12.5 2H2.5C2.22386 2 2 2.22386 2 2.5V13.5C2 13.7761 2.22386 14 2.5 14H7V16H2.5C1.11929 16 0 14.8807 0 13.5V2.5C0 1.11929 1.11929 0 2.5 0H12.5Z" fill="#1F69E0"/>
                  <path d="M11 8.5V9.71875C11 10.1776 10.6881 10.5772 10.2383 10.668C9.51869 10.8132 8.41612 11 7.5 11C6.58388 11 5.48131 10.8132 4.76172 10.668C4.31192 10.5772 4 10.1776 4 9.71875V8.5C4 8.5 5 9 7.5 9C10 9 11 8.5 11 8.5Z" fill="#1F69E0"/>
                  <path d="M7.5 3C8.32843 3 9 3.67157 9 4.5C9 4.94407 8.80568 5.34156 8.49902 5.61621V5.86719C8.49902 6.5698 8.86817 7.22159 9.4707 7.58301L9.85449 7.8125C9.29918 7.91185 8.52634 8 7.5 8C6.47249 8 5.69901 7.912 5.14355 7.8125L5.52832 7.58301C6.1305 7.2216 6.49889 6.57046 6.49902 5.86816V5.61426C6.19356 5.33967 6 4.94308 6 4.5C6 3.67157 6.67157 3 7.5 3Z" fill="#1F69E0"/>
                  <path fill-rule="evenodd" clip-rule="evenodd" d="M15.7071 10.4928C16.0976 10.8834 16.0976 11.5165 15.7071 11.9071L12.0607 15.5535C11.4749 16.1393 10.5251 16.1393 9.93934 15.5535L8.29289 13.9071C7.90237 13.5165 7.90237 12.8834 8.29289 12.4928C8.68342 12.1023 9.31658 12.1023 9.70711 12.4928L11 13.7857L14.2929 10.4928C14.6834 10.1023 15.3166 10.1023 15.7071 10.4928Z" fill="#458BFA"/>
                </svg>
              </span>
              <span class="float-menu-item__text">全文翻译</span>
            </button>
            <button class="float-menu-item" type="button" role="menuitem">
              <span class="float-widget__icon float-widget__icon--check" aria-hidden="true">
                <svg viewBox="0 0 16 16" width="16" height="16"><circle cx="7" cy="7" r="5.5" fill="none" stroke="#2b7de9" stroke-width="1.2"/><path d="M5 7l1.5 1.5L9 5.5" fill="none" stroke="#2b7de9" stroke-width="1.2" stroke-linecap="round"/></svg>
              </span>
              <span class="float-menu-item__text">论文查重</span>
            </button>
            <button class="float-menu-item" type="button" role="menuitem">
              <span class="float-widget__icon float-widget__icon--mindmap" aria-hidden="true">
                <svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="4" r="2" fill="#7b61ff"/><circle cx="4" cy="12" r="2" fill="#7b61ff"/><circle cx="12" cy="12" r="2" fill="#7b61ff"/><path d="M8 6v2M6.5 9.5L5 10.5M9.5 9.5L11 10.5" stroke="#7b61ff" stroke-width="1.2"/></svg>
              </span>
              <span class="float-menu-item__text">生成脑图</span>
            </button>
            <button class="float-menu-item" type="button" role="menuitem">
              <span class="float-widget__icon float-widget__icon--layout" aria-hidden="true">
                <svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="3" width="12" height="10" rx="1" fill="none" stroke="#2b7de9" stroke-width="1.2"/><path d="M2 6h12M6 6v7" stroke="#2b7de9" stroke-width="1.2"/></svg>
              </span>
              <span class="float-menu-item__text">一键排版</span>
            </button>
            <div class="float-menu-divider" role="separator"></div>
            <div class="float-menu-item-wrap">
              <button class="float-menu-item float-menu-item--settings" type="button" role="menuitem" aria-haspopup="true">
                <span class="float-widget__icon float-widget__icon--settings" aria-hidden="true">
                  <svg viewBox="0 0 13.2805 14" width="16" height="16" fill="none" aria-hidden="true">

              <li>
                <button class="lingxi-suggest-card lingxi-suggest-card--highlight" type="button">

                    <svg viewBox="0 0 20 20" width="20" height="20"><rect x="4" y="3" width="12" height="14" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M7 7h6M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>

              <li>
                <button class="lingxi-suggest-card" type="button">

                    <svg viewBox="0 0 20 20" width="20" height="20"><rect x="3" y="3" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/><rect x="11" y="3" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/><rect x="3" y="11" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/><rect x="11" y="11" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>

                <button class="lingxi-replace-params__cancel" id="lingxiResizeParamsCancel" type="button">取消</button>

                            <stop offset="0%" stop-color="#7B61FF"/>
                            <stop offset="50%" stop-color="#4F8EF7"/>
                            <stop offset="100%" stop-color="#3ECFCF"/>

                    <svg viewBox="0 0 12 12" width="10" height="10" aria-hidden="true">
                      <path d="M2 4l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

                  <button class="lingxi-input-box__send lingxi-input-box__send--disabled" id="lingxiSendBtn" type="button" title="发送" aria-label="发送" disabled>

                  </button>
                </div>
              </div>
            </div>

          <p class="lingxi-sidebar__disclaimer">内容由 AI 生成</p>
